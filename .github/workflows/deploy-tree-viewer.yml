name: Deploy tree viewer

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-tree-viewer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tree-viewer-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: web
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
