name: Deploy tree viewer

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "web/**"
      - ".github/workflows/deploy-tree-viewer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tree-viewer-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build research frontend
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build
      - name: Assemble site and preserve the Potree viewer
        run: |
          mkdir -p _site/legacy
          cp -a frontend/dist/. _site/
          cp -a web/. _site/legacy/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
